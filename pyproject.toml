[project]
name = "aurelius"
version = "0.1.0"
description = "Aurelius — 1.3B decoder-only LLM trained from scratch"
requires-python = ">=3.12"
dependencies = [
    "torch>=2.3.0",
    "transformers>=4.45.0",
    "tokenizers>=0.20.0",
    "datasets>=3.0.0",
    "accelerate>=1.0.0",
    "trl>=0.12.0",
    "peft>=0.13.0",
    "safetensors>=0.4.0",
    "einops>=0.8.0",
    "pyyaml>=6.0",
    "rich>=13.0.0",
    "numpy>=1.26.0",
]

[project.optional-dependencies]
train = [
    "datatrove[io,processing]>=0.3.0",
    "flash-attn>=2.6.0",
    "deepspeed>=0.15.0",
    "wandb>=0.18.0",
    "bitsandbytes>=0.44.0",
]
apple = [
    "mlx>=0.18.0",
    "mlx-lm>=0.18.0",
]
eval = [
    "lm-eval>=0.4.4",
]
serve = [
    "fastapi>=0.115.0",
    "uvicorn>=0.32.0",
    "openai>=1.50.0",
    "httpx>=0.27.0",
]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=5.0.0",
    "ruff>=0.7.0",
]

[project.scripts]
aurelius = "src.cli.main:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["aurelius*", "src*"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
