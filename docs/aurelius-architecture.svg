<svg width="100%" viewBox="0 0 680 540" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text class="th" x="340" y="30" text-anchor="middle" dominant-baseline="central">Aurelius architecture</text>
  <text class="ts" x="340" y="50" text-anchor="middle" dominant-baseline="central">Four-layer full-stack AI platform</text>

  <!-- Layer 4: Frontend -->
  <g class="c-gray">
    <rect x="40" y="72" width="600" height="80" rx="16" stroke-width="0.5"/>
    <text class="th" x="60" y="94">User-facing layer</text>
  </g>
  <g class="node c-teal">
    <rect x="220" y="100" width="240" height="40" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="120" text-anchor="middle" dominant-baseline="central">Frontend (React / TypeScript)</text>
  </g>
  <text class="ts" x="340" y="155" text-anchor="middle">Port 5173 — mission control dashboard, chat, analytics</text>

  <!-- Arrow: Frontend → BFF -->
  <line x1="340" y1="152" x2="340" y2="178" class="arr" marker-end="url(#arrow)"/>
  <text class="ts" x="350" y="168">HTTP / WebSocket</text>

  <!-- Layer 3: Node.js BFF -->
  <g class="c-gray">
    <rect x="40" y="184" width="600" height="80" rx="16" stroke-width="0.5"/>
    <text class="th" x="60" y="204">API gateway layer</text>
  </g>
  <g class="node c-purple">
    <rect x="170" y="210" width="340" height="40" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="230" text-anchor="middle" dominant-baseline="central">Node.js BFF (middle/ — TypeScript)</text>
  </g>
  <text class="ts" x="340" y="265" text-anchor="middle">Port 3001 — auth, SSE, cron scheduler, file serving, 17 route modules</text>

  <!-- Arrow: BFF → Rust Gateway -->
  <line x1="300" y1="264" x2="300" y2="290" class="arr" marker-end="url(#arrow)"/>
  <text class="ts" x="310" y="280">HTTP</text>

  <!-- Layer 3b: Rust Gateway -->
  <g class="node c-coral" opacity="0.5">
    <rect x="55" y="296" width="240" height="40" rx="8" stroke-width="0.5"/>
    <text class="th" x="175" y="316" text-anchor="middle" dominant-baseline="central">Rust API gateway (optional)</text>
  </g>
  <text class="ts" x="175" y="340" text-anchor="middle">Port 8081 — reverse proxy, JWT auth</text>

  <!-- Arrow: Rust Gateway → Python -->
  <line x1="175" y1="336" x2="175" y2="368" class="arr" marker-end="url(#arrow)"/>

  <!-- Arrow: BFF → Python (direct) -->
  <line x1="380" y1="264" x2="380" y2="368" class="arr" marker-end="url(#arrow)"/>

  <!-- Layer 2: Python Backend -->
  <g class="c-gray">
    <rect x="40" y="374" width="600" height="80" rx="16" stroke-width="0.5"/>
    <text class="th" x="60" y="394">Model serving layer</text>
  </g>
  <g class="node c-blue">
    <rect x="170" y="400" width="340" height="40" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="420" text-anchor="middle" dominant-baseline="central">Python API server (gateway/ — Python 3.12)</text>
  </g>
  <text class="ts" x="340" y="455" text-anchor="middle">Port 8080 — /v1/chat/completions, /v1/models, 54 serving modules</text>

  <!-- Arrow: Python → Rust Engine -->
  <line x1="340" y1="454" x2="340" y2="480" class="arr" marker-end="url(#arrow)"/>

  <!-- Layer 1: Rust Engine -->
  <g class="c-gray">
    <rect x="40" y="486" width="600" height="44" rx="16" stroke-width="0.5"/>
    <text class="th" x="60" y="510">Data engine layer</text>
  </g>

  <!-- Key at bottom -->
  <g class="c-gray">
    <rect x="40" y="498" width="600" height="20" rx="8" stroke-width="0" fill="none"/>
  </g>
  <rect x="100" y="500" width="12" height="12" rx="2" fill="#0F6E56" stroke="none"/>
  <text class="ts" x="118" y="512">NODE.JS NAPI</text>
  <rect x="230" y="500" width="12" height="12" rx="2" fill="#534AB7" stroke="none"/>
  <text class="ts" x="248" y="512">PYTHON</text>
  <rect x="330" y="500" width="12" height="12" rx="2" fill="#185FA5" stroke="none"/>
  <text class="ts" x="348" y="512">RUST</text>
  <rect x="430" y="500" width="12" height="12" rx="2" fill="#993C1D" stroke="none"/>
  <text class="ts" x="448" y="512">RUST BINARY</text>
</svg>