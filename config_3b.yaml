aurelius_3b:
  d_model: 2560
  n_heads: 32
  d_ff: 10240
  n_layers: 32
  vocab_size: 50257
  max_seq_len: 8192
  d_mem: 768
  episodic_slots: 2048
  lts_capacity: 4096
  consolidation_freq: 256
  graph_threshold: 0.65
  dropout: 0.0

  # Agent configuration
  n_known_tools: 128
  n_simulations: 16
  skill_dim: 256
  max_skills: 8192
  n_top_k_skills: 16
  max_agent_context: 16384
  replay_capacity: 50000

training:
  batch_size: 4
  micro_batch_size: 1
  learning_rate: 1.5e-4
  min_lr: 1e-5
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  warmup_steps: 3000
  total_steps: 500000
  grad_clip: 1.0
  optimizer: "adamw"
  scheduler: "cosine"
  memory_loss_weight: 0.1
  consolidation_loss_weight: 0.05
  gradient_checkpointing: true
  mixed_precision: bf16
  cpu_offload: true
  agent_rl_coef: 0.3
  imitation_coef: 1.0

data:
  pretrain_corpus: 500B_tokens
  memory_curriculum: 20B_tokens
  agent_demonstrations: 500M_tokens
  eval_interval: 500
  save_interval: 5000

infrastructure:
  n_gpus: 16
  gpu_type: "H100_80GB"
  distributed_strategy: "fsdp"
  cpu_offload_params: true
  activation_memory_budget_mb: 131072
  kv_cache_quant_bits: 8
  tensor_parallel: 2
  pipeline_parallel: 2
