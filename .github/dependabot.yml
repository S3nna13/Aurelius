version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    assignees:
      - "s3nna13"
    labels:
      - "dependencies"
      - "python"
    groups:
      torch-deps:
        patterns:
          - "torch*"
      dev-deps:
        patterns:
          - "pytest*"
          - "ruff*"

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    assignees:
      - "s3nna13"
    labels:
      - "dependencies"
      - "frontend"
    groups:
      react-deps:
        patterns:
          - "react*"
          - "@types/react*"

  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "rust"

  - package-ecosystem: "npm"
    directory: "/middle"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "middle"

  - package-ecosystem: "npm"
    directory: "/server"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "server"

  - package-ecosystem: "docker"
    directory: "/deployment"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "docker"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "ci"
