name: Rust

on:
  push:
    paths:
      - 'crates/**'
      - 'tools/**'
      - 'Cargo.lock'
    branches:
      - 'main'
      - 'cycle/*'
      - 'feat/*'
  pull_request:
    paths:
      - 'crates/**'
      - 'tools/**'
    branches:
      - 'main'

jobs:
  build:
    name: Build and lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        crate:
          - crates/data-engine
          - crates/token-counter
          - crates/session-manager
          - crates/search-index
          - crates/redis-client
          - crates/text-processor
          - crates/vector-similarity
          - crates/prompt-templates
          - crates/json-validator
          - crates/uuid-gen
          - crates/api-gateway
          - tools/data-cli

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@b3b06ba2ba8d33e8fa1d0c457d8f63657e1b2c5e # stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@9d47c0584c1a4c68c8351e0771a1cf8a7bdcf3c6 # v2
        with:
          workspaces: ${{ matrix.crate }}

      - name: Check formatting
        run: cargo fmt --all --check
        working-directory: ${{ matrix.crate }}

      - name: Run clippy
        run: cargo clippy -- -D warnings
        working-directory: ${{ matrix.crate }}

      - name: Build
        run: cargo build
        working-directory: ${{ matrix.crate }}

  napi-crates:
    name: NAPI build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        crate:
          - crates/data-engine

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@b3b06ba2ba8d33e8fa1d1c457d8f63657e1b2c5e # stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@9d47c0584c1a4c68c8351e0771a1cf8a7bdcf3c6 # v2
        with:
          workspaces: ${{ matrix.crate }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.crate }}

      - name: Build NAPI crate
        run: npm run build
        working-directory: ${{ matrix.crate }}
