name: CI

on:
  push:
    branches:
      - 'main'
      - 'cycle/*'
      - 'sec/*'
      - 'feat/*'
      - 'deploy/*'
  pull_request:
    branches:
      - 'main'

permissions:
  contents: read

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ['3.12', '3.13']
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install Node dependencies (for integration tests)
        run: |
          npm ci

      - name: Run focused stability tests
        run: |
          # The historical repo-wide non-integration suite exceeds the release-gate window.
          # Keep CI focused on AMC-first, package, serving, sandbox, and security regressions.
          timeout 300 python -m pytest \
            tests/eval/test_amc_memory_runner.py \
            tests/eval/test_amc_memory_benchmark.py \
            tests/eval/test_benchmark_config.py \
            tests/memory/test_amc_tier2.py \
            tests/test_package_consolidation.py \
            tests/test_package_namespace.py \
            tests/serving/test_web_ui.py \
            tests/serving/test_engine_loader.py \
            tests/agent/test_plugin_sandbox.py \
            tests/inference/test_code_execution.py \
            tests/multimodal/test_voice_engine.py \
            -q --tb=short --maxfail=10

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.python-version }}
          path: .coverage
        if: always()

  lint:
    name: Lint and type check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Ruff lint
        run: |
          python -m ruff check src/ tests/ agent/ aurelius_cli/ gateway/ acp_adapter/ cron/ plugins/ tools/ scripts/ --ignore=I001

      - name: Run Ruff format check
        run: |
          python -m ruff format --check src/ tests/ agent/ aurelius_cli/ gateway/ acp_adapter/ cron/ plugins/ tools/ scripts/

      - name: Run py_compile on all Python files
        run: |
          find src tests agent aurelius_cli gateway acp_adapter cron plugins tools -name "*.py" -exec python -m py_compile {} +

  security:
    name: Security scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit
          pip install -e ".[dev]"

      - name: Run Bandit
        run: |
          # Existing low-severity findings are tracked in bandit-baseline.json.
          # Any new Bandit finding, or any reintroduced medium/high finding, fails CI.
          bandit -r src/ agent/ aurelius_cli/ gateway/ acp_adapter/ cron/ plugins/ tools/ scripts/ \
            --baseline bandit-baseline.json \
            -f json \
            -o bandit-report.json
          bandit -r src/ agent/ aurelius_cli/ gateway/ acp_adapter/ cron/ plugins/ tools/ scripts/ \
            --baseline bandit-baseline.json \
            --severity-level low

      - name: Run pip-audit
        run: |
          pip-audit --desc

  frontend:
    name: Frontend lint and test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: cd frontend && npx tsc -b --noEmit

      - name: Run lint
        run: npm run lint -w frontend

      - name: Run tests
        run: npm run test -w frontend

  middle:
    name: Middle layer lint and test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: cd middle && npx tsc --noEmit

      - name: Run lint
        run: npm run lint -w middle
