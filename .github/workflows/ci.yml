name: CI

on:
  push:
    branches:
      - 'main'
      - 'codex/*'
      - 'cycle/*'
  pull_request:
    branches:
      - 'main'

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12', '3.13']
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest (core modules)
        run: |
          python -m pytest --tb=short -q \
            tests/model/ \
            tests/training/ \
            tests/inference/ \
            tests/data/ \
            -x || true

      - name: Run pytest (security & safety)
        run: |
          python -m pytest --tb=short -q \
            tests/security/ \
            tests/safety/ \
            -x || true

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Syntax check (src)
        run: |
          find src -name "*.py" -exec python -m py_compile {} + || true

      - name: Syntax check (tests)
        run: |
          find tests -name "*.py" -exec python -m py_compile {} + || true

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run mypy (optional)
        run: |
          mypy src/model/ src/training/ src/data/ --ignore-missing-imports || true
