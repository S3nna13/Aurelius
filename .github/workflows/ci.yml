name: CI

on:
  push:
    branches:
      - 'main'
      - 'codex/*'
  pull_request:
    branches:
      - 'main'

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run pytest (subset)
        run: |
          python -m pytest --tb=short -q tests/eval/test_webarena_scorer.py tests/deployment/test_github_actions.py

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Syntax check
        run: |
          python -m py_compile src/eval/webarena_scorer.py
          python -m py_compile src/deployment/github_actions.py
