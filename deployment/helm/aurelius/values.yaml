replicaCount: 1

image:
  repository: ghcr.io/s3nna13/aurelius
  # TODO: pin to digest in production after building and pushing:
  #   docker pull ghcr.io/s3nna13/aurelius:v1.0.0
  #   tag: "v1.0.0@sha256:..."
  tag: "v1.0.0"
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 8080

resources:
  requests: { cpu: "2", memory: "8Gi" }
  limits: { cpu: "4", memory: "16Gi" }

ingress:
  enabled: false

gpu:
  enabled: false

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

env: {}

# --- Aurelius Gateway (Rust) ---
gateway:
  enabled: false
  replicaCount: 1
  image:
    repository: ghcr.io/s3nna13/aurelius-gateway
    # TODO: pin to digest in production after building and pushing
    tag: "v1.0.0"
    pullPolicy: IfNotPresent
  service:
    port: 8080
  resources:
    requests: { cpu: "1", memory: "512Mi" }
    limits: { cpu: "2", memory: "1Gi" }

# --- Middle Layer (Node.js BFF) ---
middle:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/s3nna13/aurelius-middle
    # TODO: pin to digest in production after building and pushing
    tag: "v1.0.0"
    pullPolicy: IfNotPresent
  service:
    port: 3001
  resources:
    requests: { cpu: "1", memory: "1Gi" }
    limits: { cpu: "2", memory: "2Gi" }
  env:
    UPSTREAM_URL: "http://aurelius:8080"
    MIDDLE_LOG_LEVEL: "info"

# --- Frontend ---
frontend:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/s3nna13/aurelius-frontend
    # TODO: pin to digest in production after building and pushing
    tag: "v1.0.0"
    pullPolicy: IfNotPresent
  service:
    port: 80
  resources:
    requests: { cpu: "0.5", memory: "256Mi" }
    limits: { cpu: "1", memory: "512Mi" }
