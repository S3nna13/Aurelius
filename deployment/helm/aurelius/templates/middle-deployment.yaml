{{- if .Values.middle.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aurelius.fullname" . }}-middle
  labels:
    app.kubernetes.io/name: {{ include "aurelius.name" . }}-middle
    helm.sh/chart: {{ include "aurelius.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.middle.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "aurelius.name" . }}-middle
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "aurelius.name" . }}-middle
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
      containers:
        - name: middle
          image: "{{ .Values.middle.image.repository }}:{{ .Values.middle.image.tag }}"
          imagePullPolicy: {{ .Values.middle.image.pullPolicy }}
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: {{ .Values.middle.service.port }}
              name: http
          env:
            - name: MIDDLE_HOST
              value: "0.0.0.0"
            - name: MIDDLE_PORT
              value: "{{ .Values.middle.service.port }}"
            {{- range $key, $val := .Values.middle.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
          resources:
            {{- toYaml .Values.middle.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "aurelius.fullname" . }}-middle
  labels:
    app.kubernetes.io/name: {{ include "aurelius.name" . }}-middle
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.middle.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ include "aurelius.name" . }}-middle
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
