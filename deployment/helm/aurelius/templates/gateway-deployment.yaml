{{- if .Values.gateway.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aurelius.fullname" . }}-gateway
  labels:
    app.kubernetes.io/name: {{ include "aurelius.name" . }}-gateway
    helm.sh/chart: {{ include "aurelius.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.gateway.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "aurelius.name" . }}-gateway
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "aurelius.name" . }}-gateway
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
      containers:
        - name: gateway
          image: "{{ .Values.gateway.image.repository }}:{{ .Values.gateway.image.tag }}"
          imagePullPolicy: {{ .Values.gateway.image.pullPolicy }}
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: {{ .Values.gateway.service.port }}
              name: http
          env:
            - name: GATEWAY_HOST
              value: "0.0.0.0"
            - name: GATEWAY_PORT
              value: "{{ .Values.gateway.service.port }}"
            - name: UPSTREAM_URL
              value: "http://{{ include "aurelius.fullname" . }}-middle:3001"
            - name: RATE_LIMIT_RPS
              value: "100"
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "aurelius.fullname" . }}-gateway
  labels:
    app.kubernetes.io/name: {{ include "aurelius.name" . }}-gateway
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.gateway.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ include "aurelius.name" . }}-gateway
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
