apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aurelius.fullname" . }}
  labels:
    {{- include "aurelius.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "aurelius.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "aurelius.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: aurelius
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.gpu.enabled }}
          resources:
            limits:
              nvidia.com/gpu: "1"
          {{- end }}
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
