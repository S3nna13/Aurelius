upstream aurelius_api {
    server localhost:3001;
    keepalive 64;
}

upstream aurelius_python {
    server localhost:8080;
    keepalive 16;
}

server {
    listen 80;
    server_name aurelius.local;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name aurelius.local;

    # SSL (self-signed for dev; replace in production)
    ssl_certificate /etc/ssl/certs/aurelius.crt;
    ssl_certificate_key /etc/ssl/private/aurelius.key;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Frontend static files
    root /app/frontend/dist;
    index index.html;
    gzip_static on;

    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API — Node.js BFF
    location /api/ {
        proxy_pass http://aurelius_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;

        # SSE support
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
    }

    # Python model serving API
    location /v1/ {
        proxy_pass http://aurelius_python;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # WebSocket
    location /ws/ {
        proxy_pass http://aurelius_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    # Health check
    location /healthz {
        access_log off;
        return 200 "healthy\n";
    }
}
