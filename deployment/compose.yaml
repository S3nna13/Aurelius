version: "3.9"

services:
  aurelius-api:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - AURELIUS_VERSION=${AURELIUS_VERSION:-0.1.0}
      - AURELIUS_LOG_LEVEL=${AURELIUS_LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz')"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits: { cpus: '4', memory: 16G }
        reservations: { cpus: '2', memory: 8G }

  aurelius-gateway:
    build:
      context: ../crates/api-gateway
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    environment:
      - GATEWAY_HOST=0.0.0.0
      - GATEWAY_PORT=8080
      - UPSTREAM_URL=http://middle:3001
      - JWT_SECRET=${JWT_SECRET:-aurelius-gateway-secret}
      - RATE_LIMIT_RPS=${RATE_LIMIT_RPS:-100}
      - RATE_LIMIT_BURST=${RATE_LIMIT_BURST:-200}
    depends_on:
      middle:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    profiles:
      - gateway

  middle:
    build:
      context: ..
      dockerfile: middle/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - MIDDLE_HOST=0.0.0.0
      - MIDDLE_PORT=3001
      - UPSTREAM_URL=http://aurelius-api:8080
      - CORS_ORIGIN=http://localhost:5173
      - MIDDLE_LOG_LEVEL=info
      - AURELIUS_API_KEY=${AURELIUS_API_KEY:-dev-key}
      - UPLOAD_DIR=/data/uploads
    volumes:
      - middle-data:/data
    depends_on:
      aurelius-api:
        condition: service_started
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/healthz', r => process.exit(r.statusCode===200?0:1))"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: deployment/frontend.Dockerfile
    ports:
      - "3000:80"
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:3001}
    depends_on:
      - middle
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    volumes:
      - redis-data:/data
    profiles:
      - cache

volumes:
  redis-data:
  middle-data:
