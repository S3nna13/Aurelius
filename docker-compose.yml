services:
  gateway:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "7870:7870"
    environment:
      - NODE_ENV=production
      - AURELIUS_HOST=0.0.0.0
      - AURELIUS_PORT=7870
      - AURELIUS_PYTHON_URL=http://llm:8080
      - AURELIUS_AUTH=true
    depends_on:
      - llm
    restart: unless-stopped

  llm:
    image: python:3.12-slim
    ports:
      - "8080:8080"
    working_dir: /model
    command: >
      sh -c "pip install torch --extra-index-url https://download.pytorch.org/whl/cpu && 
             echo 'Model server ready. Start with: python -m src.serving.api_server' &&
             tail -f /dev/null"
    volumes:
      - .:/model
    restart: unless-stopped
    profiles:
      - inference
