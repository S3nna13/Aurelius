aurelius_7b:
  d_model: 3584
  n_heads: 40
  d_ff: 14336
  n_layers: 40
  vocab_size: 50257
  max_seq_len: 16384
  d_mem: 1024
  episodic_slots: 4096
  lts_capacity: 8192
  consolidation_freq: 512
  graph_threshold: 0.65
  dropout: 0.0
  n_known_tools: 256
  n_simulations: 24
  skill_dim: 512
  max_skills: 16384
  n_top_k_skills: 24
  max_agent_context: 32768
  replay_capacity: 100000

training:
  batch_size: 2
  micro_batch_size: 1
  learning_rate: 1.2e-4
  min_lr: 1e-5
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  warmup_steps: 4000
  total_steps: 700000
  grad_clip: 1.0
  optimizer: "adamw"
  scheduler: "cosine"
  memory_loss_weight: 0.1
  consolidation_loss_weight: 0.05
  gradient_checkpointing: true
  mixed_precision: bf16
  cpu_offload: true
  agent_rl_coef: 0.3
  imitation_coef: 1.0

data:
  pretrain_corpus: "1T_tokens"
  memory_curriculum: 40B_tokens
  agent_demonstrations: 1B_tokens
  eval_interval: 500
  save_interval: 5000

infrastructure:
  n_gpus: 32
  gpu_type: "H100_80GB"
  distributed_strategy: "fsdp"
  cpu_offload_params: true
  activation_memory_budget_mb: 262144
  kv_cache_quant_bits: 8
  tensor_parallel: 4
  pipeline_parallel: 2
